# This is a basic workflow to help you get started with Actions

name: Common build workflow

# Controls when the action will run. Triggers the workflow on push
# events but only for the master branch
on:
  workflow_call:
    inputs:
      ExecuteOnMoreOSes:
        description: 'Executes tests on more Oses'
        required: false
        default: false
        type: boolean
      ExecuteOnLargerJDKVendorSet:
        description: 'Executes tests on more JDK vendor'
        required: false
        default: false
        type: boolean
      ExecuteOnLargerJDKVersionSet:
        description: 'Executes tests on more JDK version'
        required: false
        default: false
        type: boolean
      EnableLinuxTests:
        description: 'Enable tests in Linux'
        required: false
        default: false
        type: boolean
      EnableWindowsTests:
        description: 'Enable tests in Windows'
        required: false
        default: false
        type: boolean
      EnableMacOSTests:
        description: 'Enable tests in MacOS'
        required: false
        default: false
        type: boolean
      ForceExecution:
        description: 'Force execution of workflow'
        required: false
        default: false
        type: boolean
      GeneratePR:
        description: 'Generate the PR at the end'
        required: false
        default: false
        type: boolean
    secrets:
      actor:
        required: true
      GITHUB_TOKEN_INHERITED:
        required: true
      JCOBRIDGE_ENCODED:
        required: true
env:
    SCALARELEASE: 2.13.13

# This workflow contains two jobs called "check" and "build_windows"
jobs:
  # This workflow contains a single job called "build"
  build_windows:
    strategy:
      fail-fast: false
      matrix:
        os: [ 'windows-2022' ]
        framework: [ 'net462', 'net8.0', 'net9.0', 'net10.0' ]

    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a set of commands using the runners shell
      # Support longpaths
      - name: Support long paths
        run: git config --system core.longpaths true
      
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
        with: 
          fetch-depth: '1'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.x

      # Runs a set of commands using the runners shell
      - name: Build JCOReflectorCLI
        run: dotnet build --no-incremental --configuration Release --framework ${{ matrix.framework }} /p:Platform="Any CPU" src\net\JCOReflectorCLI.sln

      - uses: nuget/setup-nuget@v4
        with:
          nuget-version: '5.x'
          
      # Runs a set of commands using the runners shell
      - name: Copy configuration file
        if: ${{ matrix.framework != 'net462' }}
        run: Copy-Item .github\workflows\JCOReflectorCLI_${{ matrix.framework }}.runtimeconfig.json -Destination bin\${{ matrix.framework }}\MASES.JCOReflectorCLI.runtimeconfig.json -Force
          
      - name: Remove Java files
        run: Remove-Item .\src\jvm\src\${{ matrix.framework }} -Recurse -Force

      - name: Reflect ${{ matrix.framework }} Java files
        run: .\bin\${{ matrix.framework }}\MASES.JCOReflectorCLI -JobType Reflect -JobFile .github\workflows\reflect_${{ matrix.framework }}.job

      - name: Build Java files ${{ matrix.framework }}
        run: .\bin\${{ matrix.framework }}\MASES.JCOReflectorCLI -JobType Build -JobFile .github\workflows\build_win19.job -JDKFolder %JAVA_HOME_8_X64%
        shell: cmd

      - name: Build JAR files ${{ matrix.framework }}
        run: .\bin\${{ matrix.framework }}\MASES.JCOReflectorCLI -JobType CreateJars -JobFile .github\workflows\createjars_${{ matrix.framework }}_win19.job -JDKFolder %JAVA_HOME_8_X64%
        shell: cmd

      - name: Save ${{ matrix.framework }} JCOReflector source in cache
        uses: actions/cache/save@v5
        with:
          enableCrossOsArchive: true
          path: |
              ./src/jvm/${{ matrix.framework }}.md
              ./src/jvm/statistics/${{ matrix.framework }}/
              ./src/jvm/src/${{ matrix.framework }}/
          key: JCOReflector_${{ github.run_number }}_${{ github.run_attempt }}_source_${{ matrix.framework }}_${{ github.sha }}

      - name: Save JCOReflector bin in cache
        uses: actions/cache/save@v5
        with:
          enableCrossOsArchive: true
          path: ./bin/
          key: JCOReflector_${{ github.run_number }}_${{ github.run_attempt }}_windows_bin_${{ matrix.framework }}_${{ github.sha }}

  # This workflow contains a single job called "build"
  build_windows_prepare_scala:
    needs: build_windows
    strategy:
      fail-fast: false
      matrix:
        os: [ 'windows-2022' ]

    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Download Scala package
        run: C:\msys64\usr\bin\wget.exe https://downloads.lightbend.com/scala/${{ env.SCALARELEASE }}/scala-${{ env.SCALARELEASE }}.zip

      - name: Expand Scala package
        run: Expand-Archive -LiteralPath '.\scala-${{ env.SCALARELEASE }}.zip' -DestinationPath .\bin\ -Force

      - name: Save Scala bin in cache
        uses: actions/cache/save@v5
        with:
          enableCrossOsArchive: true
          path: ./bin/
          key: JCOReflector_${{ github.run_number }}_${{ github.run_attempt }}_windows_bin_scala_${{ env.SCALARELEASE }}_${{ github.sha }}

  # This workflow contains a single job called "build"
  build_linux:
    needs: build_windows
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-22.04' ]
        framework: [ 'net8.0', 'net9.0', 'net10.0' ]
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

      # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
        with: 
          fetch-depth: '1'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.x
            10.x

      - name: Restore ${{ matrix.framework }} JCOReflector source from cache
        uses: actions/cache/restore@v5
        with:
          fail-on-cache-miss: true
          enableCrossOsArchive: true
          path: |
              ./src/jvm/${{ matrix.framework }}.md
              ./src/jvm/statistics/${{ matrix.framework }}/
              ./src/jvm/src/${{ matrix.framework }}/
          key: JCOReflector_${{ github.run_number }}_${{ github.run_attempt }}_source_${{ matrix.framework }}_${{ github.sha }}

      # Runs a set of commands using the runners shell
      - name: Build ${{ matrix.framework }} JCOReflectorCLI
        run: dotnet build --no-incremental --framework ${{ matrix.framework }} --configuration Release src/net/JCOReflectorCLI.sln

      - name: Build ${{ matrix.framework }} Java files
        run: dotnet bin/${{ matrix.framework }}/MASES.JCOReflectorCLI.dll -JobType Build -JDKFolder $JAVA_HOME_8_X64 -JobFile .github/workflows/build_linux.job

      - name: Build JAR files
        run: dotnet bin/${{ matrix.framework }}/MASES.JCOReflectorCLI.dll -JobType CreateJars -JDKFolder $JAVA_HOME_8_X64 -JobFile .github/workflows/createjars_${{ matrix.framework }}_linux.job

      - name: Extract commit SHA
        run: |
          echo "GITHUB_COMMIT_MESSAGE=$(echo $GITHUB_SHA | cut -c 1-7)" >> $GITHUB_ENV

      - name: Save ${{ matrix.framework }} JCOReflector bin in cache
        uses: actions/cache/save@v5
        with:
          enableCrossOsArchive: true
          path: ./bin/
          key: JCOReflector_${{ github.run_number }}_${{ github.run_attempt }}_linux_bin_${{ matrix.framework }}_${{ github.sha }}

  # prepare matrix info
  prepare_matrix_data:
    needs: [build_windows, build_windows_prepare_scala, build_linux]
    runs-on: ubuntu-latest
    outputs:
      matrix_jdk_vendor: ${{ steps.set-jdk-vendor.outputs.matrix_jdk_vendor || steps.set-jdk-vendor-ext.outputs.matrix_jdk_vendor }}
      matrix_jdk_version: ${{ steps.set-jdk-version.outputs.matrix_jdk_version || steps.set-jdk-version-ext.outputs.matrix_jdk_version }}
      matrix_win_os: ${{ steps.set-matrix-win-os.outputs.matrix_win || steps.set-matrix-win-os-ext.outputs.matrix_win }}
      matrix_linux_os: ${{ steps.set-matrix-linux-os.outputs.matrix_linux || steps.set-matrix-linux-os-ext.outputs.matrix_linux }}
      matrix_mac_os: ${{ steps.set-matrix-mac-os.outputs.matrix_mac || steps.set-matrix-mac-os-ext.outputs.matrix_mac }}
      matrix_unix_os: ${{ steps.set-matrix-unix-os.outputs.matrix_unix || steps.set-matrix-unix-os-ext.outputs.matrix_unix }}
    steps:
      - id: set-jdk-vendor
        if: ${{ inputs.ExecuteOnLargerJDKVendorSet == false }}
        run: echo "matrix_jdk_vendor=[ 'temurin' ]" >> $GITHUB_OUTPUT
      - id: set-jdk-vendor-ext
        if: ${{ inputs.ExecuteOnLargerJDKVendorSet == true }}
        run: echo "matrix_jdk_vendor=[ 'temurin', 'zulu', 'microsoft', 'corretto', 'oracle' ]" >> $GITHUB_OUTPUT
      - id: set-jdk-version-ext
        if: ${{ inputs.ExecuteOnLargerJDKVersionSet == false }}
        run: echo "matrix_jdk_version=[ '17', '21', '25' ]" >> $GITHUB_OUTPUT
      - id: set-jdk-version
        if: ${{ inputs.ExecuteOnLargerJDKVersionSet == true }}
        run: echo "matrix_jdk_version=[ '8', '11', '17', '21', '25' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-win-os
        if: ${{ inputs.ExecuteOnMoreOSes == false }}
        run: echo "matrix_win=[ 'windows-2025' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-win-os-ext
        if: ${{ inputs.ExecuteOnMoreOSes == true }}
        run: echo "matrix_win=[ 'windows-2022', 'windows-2025', 'windows-11-arm' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-linux-os
        if: ${{ inputs.ExecuteOnMoreOSes == false }}
        run: echo "matrix_linux=['ubuntu-24.04']" >> $GITHUB_OUTPUT
      - id: set-matrix-linux-os-ext
        if: ${{ inputs.ExecuteOnMoreOSes == true }}
        run: echo "matrix_linux=[ 'ubuntu-22.04', 'ubuntu-22.04-arm', 'ubuntu-24.04', 'ubuntu-24.04-arm' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-mac-os
        if: ${{ inputs.ExecuteOnMoreOSes == false }}
        run: echo "matrix_mac=[ 'macos-15' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-mac-os-ext
        if: ${{ inputs.ExecuteOnMoreOSes == true }}
        run: echo "matrix_mac=[ 'macos-14', 'macos-15', 'macos-26' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-unix-os
        if: ${{ inputs.ExecuteOnMoreOSes == false }}
        run: echo "matrix_unix=[ 'ubuntu-24.04', 'macos-15' ]" >> $GITHUB_OUTPUT
      - id: set-matrix-unix-os-ext
        if: ${{ inputs.ExecuteOnMoreOSes == true }}
        run: echo "matrix_unix=[ 'ubuntu-22.04', 'ubuntu-22.04-arm', 'ubuntu-24.04', 'ubuntu-24.04-arm', 'macos-14', 'macos-15', 'macos-26' ]" >> $GITHUB_OUTPUT

  java_tests_windows:
    if: ${{ inputs.EnableWindowsTests }}
    needs: prepare_matrix_data
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_win_os) }}
        framework: [ 'net462', 'net8.0', 'net9.0', 'net10.0' ]
        jdk_vendor: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_jdk_vendor) }}
        jdk_version: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_jdk_version) }} # only LTS versions
        exclude:
          - os: windows-11-arm
            framework: net462
          - os: windows-11-arm
            jdk_version: 8
          - os: windows-11-arm
            jdk_version: 11
          - os: windows-11-arm
            jdk_version: 17
          - jdk_vendor: microsoft
            jdk_version: 8
          - jdk_vendor: oracle
            jdk_version: 8
          - jdk_vendor: oracle
            jdk_version: 11
          - jdk_vendor: graalvm
            jdk_version: 8
          - jdk_vendor: graalvm
            jdk_version: 11

    runs-on: ${{ matrix.os }}
    env:
      JCOBRIDGE_SCOPEDON: JCOReflector|1.0.0
      JCOBRIDGE_LicensePath: ${{ secrets.JCOBRIDGE_ENCODED }}
    
    steps:
      # Runs a set of commands using the runners shell
      # Support longpaths
      - name: Support long paths
        run: git config --system core.longpaths true
      
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
        with: 
          fetch-depth: '1'

      - uses: actions/setup-dotnet@v5
        if: matrix.framework == 'net10.0'
        with:
          dotnet-version: |
            10.x

      - name: Solved issue using workaround in https://github.com/actions/partner-runner-images/issues/99#issue-3075011959
        if: ${{ matrix.os == 'windows-11-arm' }}
        run: choco install zstandard

      - name: Restore ${{ matrix.framework }} JCOReflector bin from cache
        uses: actions/cache/restore@v5
        with:
          fail-on-cache-miss: true
          enableCrossOsArchive: true
          path: ./bin/
          key: JCOReflector_${{ github.run_number }}_${{ github.run_attempt }}_windows_bin_${{ matrix.framework }}_${{ github.sha }}
 
      - name: Set up JDK distribution
        if: ${{ matrix.jdk_vendor != 'graalvm' }}
        uses: actions/setup-java@v5
        with: # running setup-java again overwrites the settings.xml
          distribution: ${{ matrix.jdk_vendor }}
          java-version: ${{ matrix.jdk_version }}

      - name: Set up GraalVM distribution
        if: ${{ matrix.jdk_vendor == 'graalvm' }}
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '${{ matrix.jdk_version }}' # See 'Options' for more details
          distribution: 'graalvm' # See 'Supported distributions' for available options
          github-token: ${{ secrets.GITHUB_TOKEN_INHERITED }}

      - name: Build Java test source file for ${{ matrix.framework }}
        run: javac -cp ./bin/${{ matrix.framework }}/JCOReflector.jar ./tests/jvm/java/src/hierarchy/*.java ./tests/jvm/java/src/mscorlib/*.java ./tests/jvm/java/src/nettest/*.java ./tests/jvm/java/src/refout/*.java

      - name: Prepare extra argument
        if: matrix.framework == 'net9.0'
        shell: bash
        run: echo "EXTRA_ARGUMENT=--CoreCLRVersion:9" >> $GITHUB_ENV

      - name: Prepare extra argument
        if: matrix.framework == 'net10.0'
        shell: bash
        run: echo "EXTRA_ARGUMENT=--CoreCLRVersion:10" >> $GITHUB_ENV

      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" mscorlib.HelloLock ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" mscorlib.HelloNET ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" mscorlib.HelloNETEvent ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" mscorlib.HelloIterator ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" hierarchy.HelloHierarchy ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" hierarchy.HelloInterfaces ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" nettest.HelloNETSocket ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}
    
      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" nettest.HelloNETSocket -async ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" refout.HelloRefOutBase ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: java -cp "./bin/${{ matrix.framework }}/JCOReflector.jar;./tests/jvm/java/src/" refout.HelloRefOut ${{ env.EXTRA_ARGUMENT }}
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - uses: actions/upload-artifact@v7
        with:
          if-no-files-found: ignore
          name: Errors_java_tests_windows_${{ matrix.framework }}_${{ matrix.jdk_vendor }}_${{ matrix.jdk_version }}
          path: ./**/hs_err_*
          retention-days: 1

  scala_tests_windows:
    needs: prepare_matrix_data
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_win_os) }}
        framework: [ 'net462', 'net8.0', 'net9.0', 'net10.0' ]
        jdk_vendor: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_jdk_vendor) }}
        jdk_version: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_jdk_version) }} # only LTS versions
        exclude:
          - os: windows-11-arm
            framework: net462
          - os: windows-11-arm
            jdk_version: 8
          - os: windows-11-arm
            jdk_version: 11
          - os: windows-11-arm
            jdk_version: 17
          - jdk_vendor: microsoft
            jdk_version: 8
          - jdk_vendor: oracle
            jdk_version: 8
          - jdk_vendor: oracle
            jdk_version: 11
          - jdk_vendor: graalvm
            jdk_version: 8
          - jdk_vendor: graalvm
            jdk_version: 11

    runs-on: ${{ matrix.os }}
    env:
      JCOBRIDGE_SCOPEDON: JCOReflector|1.0.0
      JCOBRIDGE_LicensePath: ${{ secrets.JCOBRIDGE_ENCODED }}
      
    steps:
      # Runs a set of commands using the runners shell
      # Support longpaths
      - name: Support long paths
        run: git config --system core.longpaths true
      
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
        with: 
          fetch-depth: '1'

      - uses: actions/setup-dotnet@v5
        if: matrix.framework == 'net10.0'
        with:
          dotnet-version: |
            10.x

      - name: Solved issue using workaround in https://github.com/actions/partner-runner-images/issues/99#issue-3075011959
        if: ${{ matrix.os == 'windows-11-arm' }}
        run: choco install zstandard

      - name: Restore ${{ matrix.framework }} JCOReflector bin from cache
        uses: actions/cache/restore@v5
        with:
          fail-on-cache-miss: true
          enableCrossOsArchive: true
          path: ./bin/
          key: JCOReflector_${{ github.run_number }}_${{ github.run_attempt }}_windows_bin_${{ matrix.framework }}_${{ github.sha }}

      - name: Restore Scala bin from cache
        uses: actions/cache/restore@v5
        with:
          fail-on-cache-miss: true
          enableCrossOsArchive: true
          path: ./bin/
          key: JCOReflector_${{ github.run_number }}_${{ github.run_attempt }}_windows_bin_scala_${{ env.SCALARELEASE }}_${{ github.sha }}

      - name: Set up JDK distribution
        if: ${{ matrix.jdk_vendor != 'graalvm' }}
        uses: actions/setup-java@v5
        with: # running setup-java again overwrites the settings.xml
          distribution: ${{ matrix.jdk_vendor }}
          java-version: ${{ matrix.jdk_version }}

      - name: Set up GraalVM distribution
        if: ${{ matrix.jdk_vendor == 'graalvm' }}
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '${{ matrix.jdk_version }}' # See 'Options' for more details
          distribution: 'graalvm' # See 'Supported distributions' for available options
          github-token: ${{ secrets.GITHUB_TOKEN_INHERITED }}

      - name: Prepare extra argument
        if: matrix.framework == 'net9.0'
        shell: bash
        run: echo "EXTRA_ARGUMENT=--CoreCLRVersion:9" >> $GITHUB_ENV

      - name: Prepare extra argument
        if: matrix.framework == 'net10.0'
        shell: bash
        run: echo "EXTRA_ARGUMENT=--CoreCLRVersion:10" >> $GITHUB_ENV

      - name: Build Scala test source file for ${{ matrix.framework }}
        shell: cmd
        run: |
          cd ./tests/jvm/scala
          mkdir output
          ..\..\..\bin\scala-${{ env.SCALARELEASE }}\bin\scalac -toolcp "../../../bin/${{ matrix.framework }}/*" -d ./output ./src/main/scala/hierarchy/* ./src/main/scala/mscorlib/* ./src/main/scala/nettest/* ./src/main/scala/refout/*
              
      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" mscorlib.HelloLock ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" mscorlib.HelloNet ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" mscorlib.HelloNETEvent ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" mscorlib.HelloIterator ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" hierarchy.HelloHierarchy ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" hierarchy.HelloInterfaces ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" nettest.HelloNETSocket ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}
    
      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" nettest.HelloNETSocket -async ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" refout.HelloRefOutBase ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: .\bin\scala-${{ env.SCALARELEASE }}\bin\scala -toolcp "./bin/${{ matrix.framework }}/*;./tests/jvm/scala/output" refout.HelloRefOut ${{ env.EXTRA_ARGUMENT }}
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - run: cd ./tests/jvm/scala && rmdir output /s /q
        shell: cmd
        continue-on-error: ${{ inputs.ForceExecution == true }}

      - uses: actions/upload-artifact@v7
        with:
          if-no-files-found: ignore
          name: Errors_scala_tests_windows_${{ matrix.framework }}_${{ matrix.jdk_vendor }}_${{ matrix.jdk_version }}
          path: ./**/hs_err_*
          retention-days: 1

  java_tests_unix:
    if: ${{ inputs.EnableLinuxTests || inputs.EnableMacOSTests }}
    needs: prepare_matrix_data
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_unix_os) }}
        framework: [ 'net8.0', 'net9.0', 'net10.0' ]
        jdk_vendor: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_jdk_vendor) }}
        jdk_version: ${{ fromJSON(needs.prepare_matrix_data.outputs.matrix_jdk_version) }} # only LTS versions
        exclude:
          - os: macos-14
            jdk_vendor: temurin
