        with:
          name: net9.0
          path: .\bin\net9.0\**\*
        
      - uses: actions/upload-artifact@v7
        with:
          name: net10.0
          path: .\bin\net10.0\**\*

      - uses: actions/upload-artifact@v7
        with:
          name: net462
          path: .\bin\net462\**\*

